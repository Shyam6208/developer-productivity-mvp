[build]
  # The path to your frontend directory
  base = "frontend"

  # The command to build the project
  command = "npm run build"

  # The directory that contains the deploy-ready HTML/CSS/JS (relative to base)
  publish = "dist"

[[redirects]]
  # Redirect all routes to index.html for Single Page Application routing (if added later)
  from = "/*"
  to = "/index.html"
  status = 200
